services:
  - type: web
    name: tripwire-cloud
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11 --activate && pnpm install
    startCommand: pnpm --filter @tripwire/server run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_BASE_URL
        sync: false
      - key: VERDICT_SIGNING_SECRET
        generateValue: true
