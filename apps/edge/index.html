<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Tripwire Edge Agent</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0c;
      --panel: #151619;
      --panel-2: #1d1f23;
      --line: #30343a;
      --text: #f4f5f7;
      --muted: #a8afb8;
      --green: #44d17d;
      --amber: #f4b942;
      --red: #ff6961;
      --orange: #ff8a3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, .65fr);
      min-height: calc(100vh - 58px);
    }
    .stage {
      position: relative;
      min-height: 420px;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: cover;
      background: #000;
      display: block;
    }
    .overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(11, 11, 12, .78);
      border: 1px solid rgba(255, 255, 255, .14);
      backdrop-filter: blur(10px);
    }
    #status {
      min-width: 0;
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
    }
    aside {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-left: 1px solid var(--line);
      background: var(--panel);
    }
    .toolbar {
      display: flex;
      gap: 8px;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      min-height: 38px;
      padding: 0 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--orange); }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border: 1px solid currentColor;
      font-size: 12px;
      font-weight: 800;
    }
    .ok { color: var(--green); }
    .warn { color: var(--amber); }
    .alert { color: var(--red); }
    #panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .metric {
      min-height: 72px;
      padding: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }
    .metric.wide { grid-column: 1 / -1; }
    .metric span {
      color: var(--muted);
      font-size: 12px;
    }
    .metric strong {
      font-size: 20px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }
    h2 {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0;
      text-transform: uppercase;
    }
    #feed {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #feed li {
      min-height: 54px;
      padding: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    #feed div {
      min-width: 0;
      display: grid;
      gap: 3px;
    }
    #feed span {
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      flex: 0 0 auto;
      padding: 4px 8px;
      border: 1px solid currentColor;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .badge.local { color: var(--muted); }
    .badge.info { color: var(--green); }
    .badge.warn { color: var(--amber); }
    .badge.alert { color: var(--red); }
    .empty { color: var(--muted); }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      aside { border-left: 0; border-top: 1px solid var(--line); }
      .stage, video { min-height: 48vh; }
      .overlay { align-items: stretch; flex-direction: column; }
      .toolbar { width: 100%; }
      button { flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tripwire</h1>
    <span id="net" class="pill warn">UNKNOWN</span>
  </header>
  <main>
    <section class="stage" aria-label="Edge camera">
      <video id="cam" playsinline muted></video>
      <div class="overlay">
        <div id="status">idle</div>
        <div class="toolbar">
          <button id="test-event" type="button">Test event</button>
          <button id="sync-now" type="button">Sync</button>
          <button id="digest" type="button">Digest</button>
        </div>
      </div>
    </section>
    <aside aria-label="Tripwire ledger">
      <div id="panel"></div>
      <h2>Ledger</h2>
      <ul id="feed"></ul>
    </aside>
  </main>
  <script type="module" src="/src/main.ts"></script>
  <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
